  <body class="home-page">
    <!-- Primary navigation stays visible over the hero image for direct page access. -->
    <header class="site-header" aria-label="Primary">
      <a class="brand-mark" href="index.html?v=20260610-listenbw1" aria-label="Foreign Logic home">
        <img src="assets/logo/foreign_logic_FL_round_clean_transparent.png" alt="Foreign Logic FL logo">
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="band.html?v=20260610-listenbw1">Lineup</a>
        <a href="music.html?v=20260610-listenbw1">Listen</a>
        <a href="tour.html?v=20260610-listenbw1">Tour</a>
        <a href="merch.html?v=20260610-listenbw1">Merch</a>
        <a href="contact.html?v=20260610-listenbw1">Contact</a>
      </nav>
    </header>

    <!-- Full-screen opening image establishes the band's visual identity immediately. -->
    <main class="hero" aria-labelledby="hero-title">
      <div class="hero-copy">
        <h1 id="hero-title">
          <img class="hero-logo" src="assets/logo/foreign_logic_wordmark_clean_transparent.png" alt="Foreign Logic">
        </h1>
      </div>
      <p class="copyright-mark">&copy; Foreign Logic 2026</p>
      <a class="photo-credit" href="https://www.instagram.com/foticosdelajudi/" target="_blank" rel="noopener noreferrer">PC: Judit Navarro</a>
    </main>

    <!-- Newsletter prompt appears when the home page is entered from outside the site. -->
    <aside class="newsletter-panel" data-newsletter-panel aria-label="Newsletter signup" aria-hidden="true">
      <button class="newsletter-close" type="button" data-newsletter-close aria-label="Close newsletter signup">&times;</button>
      <div>
        <p class="eyebrow">Newsletter</p>
        <h2>Stay in the loop</h2>
      </div>
      <div class="newsletter-embed">
        <iframe title="Foreign Logic newsletter signup" src="https://745cd0ac.sibforms.com/v2/serve/MUIFAAuGq1zl2odp7C91fuBGyikMVkhSdw1EM3lPYD5NBrKTl6h1o54FHrqHSb1-lKMbhWi5ydXjGFlygJR1tG8eKtMlrQuoZhPb2N4be0fX5OVlKQFT6OoAYHR33dFjEg3m-vMboeVKPxEQMtOoBJpjAeH5LhW73b49X9DIqnTot_SHtiYSpcMSHj0c47tIULD_GgdhFd3sKApWPw==" width="540" height="305" frameborder="0" scrolling="auto"></iframe>
      </div>
    </aside>

    <script src="site-navigation.js?v=20260610-listenbw1"></script>
    <script>
      // Show the prompt for external/direct landing entries, but not after in-site navigation.
      (() => {
        const internalNavigationKey = "foreignLogicInternalNavigation";
        const panel = document.querySelector("[data-newsletter-panel]");
        const closeButton = document.querySelector("[data-newsletter-close]");

        const dismissPanel = () => {
          panel.classList.remove("is-visible");
          panel.setAttribute("aria-hidden", "true");
        };

        const revealPanel = () => {
          panel.classList.add("is-visible");
          panel.setAttribute("aria-hidden", "false");
        };

        const cameFromInternalClick = () => {
          try {
            const didNavigateInternally = sessionStorage.getItem(internalNavigationKey) === "true";
            sessionStorage.removeItem(internalNavigationKey);
            return didNavigateInternally;
          } catch (error) {
            return false;
          }
        };

        const isInternalReferrer = () => {
          if (!document.referrer) {
            return false;
          }

          try {
            const referrerUrl = new URL(document.referrer);
            const currentUrl = new URL(window.location.href);

            if (referrerUrl.origin === currentUrl.origin && currentUrl.origin !== "null") {
              return true;
            }

            // Local file previews do not have a useful origin, so compare the site folder instead.
            if (referrerUrl.protocol === "file:" && currentUrl.protocol === "file:") {
              const currentFolder = currentUrl.pathname.replace(/\/[^/]*$/, "/");
              return referrerUrl.pathname.startsWith(currentFolder);
            }
          } catch (error) {
            return false;
          }

          return false;
        };

        if (!cameFromInternalClick() && !isInternalReferrer()) {
          setTimeout(() => requestAnimationFrame(revealPanel), 2000);
        }

        closeButton.addEventListener("click", dismissPanel);
      })();
    </script>
  </body>
</html>
